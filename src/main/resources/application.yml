spring:
  application:
    name: recruitment-service
  datasource:
    url: jdbc:mysql://localhost:3306/recruitment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: dummy@gmail.com
    password: dummypassword
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# For testing startup without OAuth2 fully configured
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-client-id
            client-secret: dummy-client-secret
            scope:
              - email
              - profile

app:
  jwt:
    secret: =======================AIRecruitmentManagementSystemSecretKey2026=======================
    expirationMs: 86400000

